# ============================================================================
# {{COMPANY_NAME}} — Organizational Structure
# ============================================================================
# Generated by Orchestrator AI Framework ({{PRESET}} preset)
# Created: {{DATE}}
# ============================================================================

company:
  name: "{{COMPANY_NAME}}"
  goal: "Deliver world-class results using AI-powered orchestration"
  owner: "{{OWNER}}"
  budget:
    monthly_limit_tokens: 50000000
    alert_threshold: 0.80
    auto_pause_threshold: 0.95
  created: "{{DATE}}"

# ============================================================================
# EXECUTIVE LAYER — Customize your leadership
# ============================================================================

agents:

  ceo:
    id: "ceo"
    name: "CEO"
    title: "Chief Executive Officer"
    type: "orchestrator"
    reports_to: null
    capabilities:
      - strategic_planning
      - task_decomposition
      - budget_allocation
      - cross_division_coordination
      - quality_assurance
    heartbeat:
      enable_timer: true
      interval_minutes: 30
      enable_on_demand: true
      cooldown_minutes: 5
    context_mode: "full"

# ============================================================================
# DIVISIONS — Add your divisions below
# ============================================================================
# Example division:
#
#   dir_marketing:
#     id: "dir-marketing"
#     name: "Marketing Director"
#     type: "manager"
#     reports_to: "ceo"
#     manages: ["worker-brand", "worker-copy"]
#     capabilities: [brand_strategy, copywriting]
#
# ============================================================================

# ============================================================================
# WORKERS — Map skills to agents
# ============================================================================
# Each worker maps 1:1 to a skill. Format:
#
#   worker-example:
#     type: "worker"
#     skill: "your-skill-name"
#     reports_to: "dir-marketing"
#     capabilities: [skill_a, skill_b]
#
# ============================================================================

workers: {}

# ============================================================================
# SHARED SERVICES
# ============================================================================

  shared_orchestrator:
    id: "shared-orchestrator"
    name: "Orchestrator Engine"
    title: "Task & Workflow Service"
    type: "service"
    reports_to: "ceo"
    capabilities:
      - task_management
      - heartbeat_scheduling
      - execution_policy_enforcement
      - audit_logging
      - budget_tracking

# ============================================================================
# EXECUTION POLICIES
# ============================================================================

execution_policies:

  default:
    comment_required: true
    review_required: false
    approval_required: false
    revision_max_loops: 3
    sla_hours: 8
    auto_approve_threshold: 75

  critical:
    comment_required: true
    review_required: true
    approval_required: true
    revision_max_loops: 3
    sla_hours: 1
    auto_approve_threshold: null

  client_facing:
    comment_required: true
    review_required: true
    approval_required: false
    revision_max_loops: 2
    sla_hours: 4
    auto_approve_threshold: 85

  financial:
    comment_required: true
    review_required: true
    approval_required: true
    revision_max_loops: 2
    sla_hours: 2
    auto_approve_threshold: null

# ============================================================================
# HEARTBEAT DEFAULTS
# ============================================================================

heartbeat_defaults:
  manager:
    interval_minutes: 30
    cooldown_minutes: 5
    coalesce_if_active: true
  worker:
    interval_minutes: 0
    cooldown_minutes: 2
    coalesce_if_active: true
  service:
    interval_minutes: 5
    cooldown_minutes: 1
    coalesce_if_active: true
