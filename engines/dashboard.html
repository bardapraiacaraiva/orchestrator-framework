<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DARIO COMMAND CENTER v9.0</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #06060f;
  color: #c8d0e0;
  font-family: 'Inter', sans-serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

#header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 48px;
  background: linear-gradient(180deg, #0a0a1a 0%, #06060f 100%);
  border-bottom: 1px solid #1a1a3e;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  z-index: 100;
}

#header .title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  color: #ffaa00;
  letter-spacing: 1.5px;
  text-shadow: 0 0 10px rgba(255, 170, 0, 0.3);
}

#header .badges {
  display: flex;
  align-items: center;
  gap: 16px;
}

#header .badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 4px;
  font-weight: 500;
}

#header .badge-active {
  background: rgba(0, 255, 136, 0.1);
  border: 1px solid rgba(0, 255, 136, 0.4);
  color: #00ff88;
}

#header .badge-guardian {
  background: rgba(255, 51, 68, 0.1);
  border: 1px solid rgba(255, 51, 68, 0.4);
  color: #ff3344;
}

#header .badge-autonomy {
  background: rgba(170, 102, 255, 0.1);
  border: 1px solid rgba(170, 102, 255, 0.4);
  color: #aa66ff;
}

#header .info {
  display: flex;
  align-items: center;
  gap: 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: #6a7a90;
}

#header .info .health {
  color: #00ff88;
}

#canvas-container {
  position: fixed;
  top: 48px;
  left: 0;
  right: 280px;
  bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

#radialCanvas {
  cursor: grab;
}

#radialCanvas:active {
  cursor: grabbing;
}

#bottom-panel {
  position: fixed;
  top: 48px;
  right: 0;
  bottom: 0;
  width: 280px;
  background: linear-gradient(180deg, #080812 0%, #06060f 100%);
  border-left: 1px solid #1a1a3e;
  display: flex;
  flex-direction: column;
  gap: 1px;
  padding: 12px 14px;
  z-index: 50;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: #1a2535 transparent;
}

/* panel-section now in sidebar block above */

.panel-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #4a5a70;
  margin-bottom: 8px;
}

.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 3px 0;
  font-size: 12px;
}

.stat-label { color: #6a7a90; }
.stat-value { color: #e0e8f0; font-family: 'JetBrains Mono', monospace; font-weight: 500; }
.stat-value.green { color: #00ff88; }
.stat-value.amber { color: #ffaa00; }
.stat-value.red { color: #ff3344; }
.stat-value.cyan { color: #00d4ff; }

#event-feed {
  overflow-y: auto;
  max-height: 200px;
  flex-shrink: 0;
  scrollbar-width: thin;
  scrollbar-color: #1a2535 transparent;
}

.panel-section {
  flex-shrink: 0;
  border-bottom: 1px solid #0d1525;
  padding-bottom: 10px;
  margin-bottom: 4px;
}

.event-item {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 3px 0;
  border-bottom: 1px solid #0a1020;
  display: flex;
  gap: 8px;
  align-items: baseline;
}

.event-time { color: #4a5a70; white-space: nowrap; }
.event-type { font-weight: 500; white-space: nowrap; }
.event-type.dispatch { color: #ffaa00; }
.event-type.complete { color: #00ff88; }
.event-type.error { color: #ff3344; }
.event-type.info { color: #00d4ff; }
.event-msg { color: #8a9ab0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

#node-details {
  font-size: 12px;
}

#node-details .detail-name {
  font-size: 14px;
  font-weight: 600;
  color: #e0e8f0;
  margin-bottom: 4px;
}

#node-details .detail-role {
  font-size: 11px;
  color: #6a7a90;
  margin-bottom: 10px;
}

#node-details .detail-stat {
  display: flex;
  justify-content: space-between;
  padding: 2px 0;
  font-size: 11px;
}

#tooltip {
  position: fixed;
  display: none;
  background: #0d1525;
  border: 1px solid #1a2a40;
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 11px;
  z-index: 200;
  pointer-events: none;
  max-width: 240px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

#tooltip .tt-name { font-weight: 600; color: #e0e8f0; margin-bottom: 2px; }
#tooltip .tt-role { color: #6a7a90; font-size: 10px; margin-bottom: 4px; }
#tooltip .tt-stat { color: #8a9ab0; font-size: 10px; }

#sidebar {
  position: fixed;
  top: 48px;
  right: 0;
  width: 220px;
  bottom: 30%;
  background: rgba(8, 8, 18, 0.95);
  border-left: 1px solid #1a1a3e;
  padding: 12px;
  z-index: 80;
  overflow-y: auto;
  display: none;
  scrollbar-width: thin;
  scrollbar-color: #1a2535 transparent;
}

#sidebar.visible { display: block; }

#sidebar .sidebar-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  color: #00d4ff;
  margin-bottom: 4px;
}

#sidebar .sidebar-count {
  font-size: 10px;
  color: #4a5a70;
  margin-bottom: 12px;
}

.worker-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
  font-size: 11px;
  border-bottom: 1px solid #0a1020;
}

.worker-dot {
  width: 8px;
  height: 8px;

}

.worker-dot.idle { background: #1a2535; }
.worker-dot.active { background: #00d4ff; box-shadow: 0 0 6px #00d4ff; }
.worker-dot.done { background: #00ff88; }
.worker-dot.blocked { background: #ff3344; }

.worker-name { color: #8a9ab0; }
</style>

<body>

<div id="header">
  <div class="title">DARIO COMMAND CENTER v9.0</div>
  <div class="badges">
    <span id="state-badge" class="badge badge-active">ACTIVE</span>
    <span class="badge badge-autonomy">P-A3</span>

  <div class="info">

</div>

<div id="canvas-container">
  <canvas id="radialCanvas"></canvas>
</div>

<div id="bottom-panel">
  <div class="panel-section">
    <div class="panel-title">System Stats</div>
    <div class="stat-row"><span class="stat-label">Active Workers</span><span id="s-active" class="stat-value cyan">0</span></div>
    <div class="stat-row"><span class="stat-label">Tasks Done</span><span id="s-done" class="stat-value green">0</span></div>

    <div id="event-feed"></div>

  <div class="panel-section">
    <div class="panel-title">Selected Node</div>

      <div style="color:#4a5a70;font-size:11px;">Click or hover a node to see details</div>

<div id="sidebar">
  <div class="sidebar-title" id="sidebar-title">Director</div>
  <div class="sidebar-count" id="sidebar-count">0 workers</div>

</div>

<div id="tooltip">
  <div class="tt-name"></div>
  <div class="tt-role"></div>
  <div class="tt-stat"></div>
</div>

<script>
// ============================================================
// DATA HIERARCHY
// ============================================================
const CEO = { id:'dario-ceo', name:'D.A.R.I.O.', role:'CEO' };

const VPS = [
  { id:'diva-vp', name:'D.I.V.A.', role:'Architecture & Design', sector:[315,45] },
  { id:'lucas-vp', name:'L.U.C.A.S.', role:'Operations & Intelligence', sector:[45,135] },
  { id:'a360-vp', name:'A360', role:'Business Acceleration', sector:[135,180] },
  { id:'atlas-vp', name:'A.T.L.A.S.', role:'Events & Logistics', sector:[180,225] },
];

const DIRECT_DIRS = [
  { id:'dir-marketing', name:'Marketing', parent:'ceo', workerCount:12, sector:[225,255],
    workers:['brand','offer','sales-letter','ads','funnel','pipeline','email-seq','naming','story-circle','pitch','proposal','negotiation'] },
  { id:'dir-technical', name:'Technical', parent:'ceo', workerCount:7, sector:[255,275],
    workers:['wp-audit','woo-audit','cwv-fix','pentest','make-blueprint','ios-hig','sop'] },
  { id:'dir-seo', name:'SEO', parent:'ceo', workerCount:16, sector:[275,315],
    workers:['seo-audit','seo-technical','seo-content','seo-schema','seo-local','seo-geo','seo-plan','seo-page','seo-sitemap','seo-images','seo-hreflang','seo-programmatic','seo-competitor','seo-dataforseo','seo-image-gen','kw-cluster'] },
  { id:'dir-finance', name:'Finance', parent:'ceo', workerCount:3, sector:[225,232],
    workers:['financial-model','pricing-calculator','saas-metrics'] },
  { id:'dir-client-success', name:'Client Success', parent:'ceo', workerCount:3, sector:[232,240],
    workers:['client-onboard','diagnose','projeto'] },
  { id:'dir-content', name:'Content', parent:'ceo', workerCount:2, sector:[240,247],
    workers:['social','content'] },
  { id:'dir-legal', name:'Legal', parent:'ceo', workerCount:1, sector:[247,250],
    workers:['legal'] },
  { id:'dir-hr', name:'HR', parent:'ceo', workerCount:1, sector:[250,253],
    workers:['hr'] },
  { id:'dir-support', name:'Support', parent:'ceo', workerCount:1, sector:[253,256],
    workers:['support'] },
  { id:'dir-product', name:'Product', parent:'ceo', workerCount:1, sector:[256,259],
    workers:['product'] },
  { id:'dir-pr', name:'PR', parent:'ceo', workerCount:1, sector:[259,262],
    workers:['pr'] },
];

const VP_DIRS = {
  'diva-vp': [
    { id:'dir-design', name:'Design', workerCount:10, workers:['moodboard','materials','floor-plan','render','render-brief','vision','portfolio','smart-home','briefing','diva-client-onboard'] },
    { id:'dir-construction', name:'Construction', workerCount:10, workers:['diva-budget','calc','timeline','inspection','contract','comparador','planradar','bim','diva-diagnose','roadmap'] },
    { id:'dir-regulatory', name:'Regulatory', workerCount:2, workers:['licensing','energy'] },
  ],
  'lucas-vp': [
    { id:'dir-cost-control', name:'Cost Control', workerCount:4, workers:['budget-tracker','model-router','cost-alerts','cost-optimizer'] },
    { id:'dir-quality', name:'Quality', workerCount:4, workers:['quality-scorer','feedback-loop','skill-evaluator','revision-analyst'] },
    { id:'dir-monitoring', name:'Monitoring', workerCount:4, workers:['heartbeat-engine','stale-detector','health-monitor','alert-dispatcher'] },
    { id:'dir-analytics', name:'Analytics', workerCount:4, workers:['cross-project','skill-dashboard','revenue-tracker','knowledge-graph'] },
    { id:'dir-saas-eng', name:'SaaS Eng', workerCount:4, workers:['backend','frontend','ai-agents','database'] },
    { id:'dir-accounting', name:'Accounting', workerCount:3, workers:['tax','compliance','reporting'] },
  ],
  'a360-vp': [
    { id:'dir-a360-research', name:'Research', workerCount:3, workers:['nicho-explorer','mapear-nicho','cliente-radar'] },
    { id:'dir-a360-production', name:'Production', workerCount:5, workers:['lp-builder','pitch-deck','gtm','playbook-vendas','meeting-prep'] },
  ],
  'atlas-vp': [
    { id:'dir-event-planning', name:'Planning', workerCount:6, workers:['ev-briefing','venue','ev-timeline','ev-budget','checklist','post-event'] },
    { id:'dir-logistics', name:'Logistics', workerCount:6, workers:['vendor','catering','transport','accommodation','staff','warehouse'] },
    { id:'dir-av-production', name:'AV Production', workerCount:5, workers:['av','staging','decor','entertainment','photo-video'] },
    { id:'dir-guest-exp', name:'Guest Exp', workerCount:5, workers:['guest','seating','protocol','ev-tech','hybrid'] },
    { id:'dir-event-biz', name:'Event Biz', workerCount:6, workers:['ev-marketing','sponsor','crm','risk','ev-compliance','sustainability'] },
  ],
};

// ============================================================
// BUILD NODE MAP
// ============================================================
const nodes = [];
const connections = [];

// CEO node
nodes.push({ id: CEO.id, name: CEO.name, role: CEO.role, type: 'ceo', x: 0, y: 0, radius: 25, color: '#ffaa00', visible: true, workerCount: 0 });

// LAYOUT: 4 VPs get 55 degrees each (220 total), 11 direct dirs get remaining 140 degrees
// VPs at: 0, 90, 180, 270 (cardinal points) — directors spread around them
const VP_ANGLES = [0, 90, 180, 270]; // DIVA=right, LUCAS=bottom, A360=left, ATLAS=top
const VP_SECTOR_SIZE = 55; // degrees per VP sector for its directors

VPS.forEach((vp, i) => {
  const angle = VP_ANGLES[i] * Math.PI / 180;
  nodes.push({
    id: vp.id, name: vp.name, role: vp.role, type: 'vp',
    baseAngle: VP_ANGLES[i],
    sector: [VP_ANGLES[i] - VP_SECTOR_SIZE/2, VP_ANGLES[i] + VP_SECTOR_SIZE/2],
    x: Math.cos(angle) * 150,
    y: Math.sin(angle) * 150,
    radius: 18, color: '#aa66ff', visible: true, workerCount: 0
  });
  connections.push({ from: CEO.id, to: vp.id });
});

function distributeInSector(dirs, sectorStart, sectorEnd, parentId, radiusDist) {
  let range = sectorEnd - sectorStart;
  if (range <= 0) range += 360;
  const step = range / (dirs.length + 1);

  dirs.forEach((dir, i) => {
    const angleDeg = sectorStart + step * (i + 1);
    const angleRad = angleDeg * Math.PI / 180;
    nodes.push({
      id: dir.id, name: dir.name, role: 'Director', type: 'director',
      parentVP: parentId,
      angleDeg: angleDeg,
      x: Math.cos(angleRad) * radiusDist,
      y: Math.sin(angleRad) * radiusDist,
      radius: 12, color: '#00d4ff', visible: true,
      workerCount: dir.workerCount,
      workers: dir.workers,
      expanded: false
    });
    connections.push({ from: parentId, to: dir.id });
  });
}

// VP directors: spread within each VP's sector
VPS.forEach((vp, i) => {
  const dirs = VP_DIRS[vp.id] || [];
  const center = VP_ANGLES[i];
  distributeInSector(dirs, center - VP_SECTOR_SIZE/2, center + VP_SECTOR_SIZE/2, vp.id, 300);
});

// Direct CEO directors: place in the 4 gaps between VPs
// VPs at 0, 90, 180, 270. Gaps: 28-62, 118-152, 208-242, 298-332
// Split 11 dirs: 3 in gap1, 3 in gap2, 3 in gap3, 2 in gap4
const GAPS = [
  { start:22, end:68, count:3 },   // between DIVA(0) and LUCAS(90)
  { start:112, end:158, count:3 },  // between LUCAS(90) and A360(180)
  { start:202, end:248, count:3 },  // between A360(180) and ATLAS(270)
  { start:292, end:338, count:2 },  // between ATLAS(270) and DIVA(0)
];
let dirIdx = 0;
GAPS.forEach(gap => {
  const step = (gap.end - gap.start) / (gap.count + 1);
  for (let g = 0; g < gap.count && dirIdx < DIRECT_DIRS.length; g++, dirIdx++) {
    const dir = DIRECT_DIRS[dirIdx];
    const angleDeg = gap.start + step * (g + 1);
    const angleRad = angleDeg * Math.PI / 180;
    nodes.push({
      id: dir.id, name: dir.name, role: 'Director (CEO)', type: 'director',
      parentVP: 'dario-ceo',
      angleDeg: angleDeg,
      x: Math.cos(angleRad) * 300,
      y: Math.sin(angleRad) * 300,
      radius: 12, color: '#00d4ff', visible: true,
      workerCount: dir.workerCount,
      workers: dir.workers,
      expanded: false
    });
    connections.push({ from: 'dario-ceo', to: dir.id });
  }
});

// Worker nodes (hidden by default)
const workerNodes = [];
nodes.forEach(n => {
  if (n.type === 'director' && n.workers) {
    n.workers.forEach((w, i) => {
      workerNodes.push({
        id: `worker-${n.id}-${w}`,
        name: w,
        role: `Worker under ${n.name}`,
        type: 'worker',
        parentDir: n.id,
        parentAngle: n.angleDeg,
        index: i,
        total: n.workers.length,
        x: 0, y: 0,
        radius: 6, color: '#1a2535',
        visible: false,
        status: 'idle'
      });
    });
  }
});

// ============================================================
// CANVAS SETUP
// ============================================================
const canvas = document.getElementById('radialCanvas');
const ctx = canvas.getContext('2d');
let W, H, cx, cy;
let scale = 1.0;
let panX = 0, panY = 0;
let dragging = false;
let dragStartX = 0, dragStartY = 0;
let panStartX = 0, panStartY = 0;
let expandedDirector = null;
let hoveredNode = null;
let selectedNode = null;
let animFrame = 0;

function resize() {
  const container = document.getElementById('canvas-container');
  W = container.clientWidth;
  H = container.clientHeight;
  canvas.width = W * window.devicePixelRatio;
  canvas.height = H * window.devicePixelRatio;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
  cx = W / 2;
  cy = H / 2;
}

window.addEventListener('resize', resize);
resize();

// ============================================================
// PARTICLES
// ============================================================
const particles = [];

function createParticle(fromId, toId, type) {
  const fromNode = nodes.find(n => n.id === fromId) || workerNodes.find(n => n.id === fromId);
  const toNode = nodes.find(n => n.id === toId) || workerNodes.find(n => n.id === toId);
  if (!fromNode || !toNode) return;

  // Create bezier control point (offset perpendicular to line)
  const mx = (fromNode.x + toNode.x) / 2;
  const my = (fromNode.y + toNode.y) / 2;
  const dx = toNode.x - fromNode.x;
  const dy = toNode.y - fromNode.y;
  const perpX = -dy * 0.3 * (Math.random() - 0.5);
  const perpY = dx * 0.3 * (Math.random() - 0.5);

  particles.push({
    fromX: fromNode.x, fromY: fromNode.y,
    toX: toNode.x, toY: toNode.y,
    cpX: mx + perpX, cpY: my + perpY,
    t: 0,
    speed: 0.008 + Math.random() * 0.006,
    color: type === 'dispatch' ? '#ffaa00' : '#00ff88',
    size: type === 'dispatch' ? 4 : 3,
    glowSize: type === 'dispatch' ? 8 : 6,
    trail: [],
    alive: true
  });
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.t += p.speed;
    if (p.t >= 1) {
      particles.splice(i, 1);
      continue;
    }
    // Quadratic bezier position
    const t = p.t;
    const mt = 1 - t;
    const px = mt * mt * p.fromX + 2 * mt * t * p.cpX + t * t * p.toX;
    const py = mt * mt * p.fromY + 2 * mt * t * p.cpY + t * t * p.toY;
    p.trail.push({ x: px, y: py, alpha: 1.0 });
    if (p.trail.length > 12) p.trail.shift();
    // Fade trail
    p.trail.forEach((tp, ti) => { tp.alpha = (ti + 1) / p.trail.length; });
  }
}

// Ambient particles
let ambientTimer = 0;
function spawnAmbientParticle() {
  const connIdx = Math.floor(Math.random() * connections.length);
  const conn = connections[connIdx];
  const type = Math.random() > 0.5 ? 'dispatch' : 'return';
  if (type === 'dispatch') {
    createParticle(conn.from, conn.to, 'dispatch');
  } else {
    createParticle(conn.to, conn.from, 'return');
  }
}

// ============================================================
// WORKER POSITION CALCULATION
// ============================================================
function calcWorkerPositions(dirNode) {
  const workers = workerNodes.filter(w => w.parentDir === dirNode.id);
  const count = workers.length;
  if (count === 0) return;

  const arcSpread = Math.min(30, count * 4); // degrees
  const halfArc = arcSpread / 2;
  const baseAngle = dirNode.angleDeg;
  const workerRadius = 420;

  workers.forEach((w, i) => {
    const offset = count === 1 ? 0 : (i / (count - 1) - 0.5) * arcSpread;
    const angleDeg = baseAngle + offset;
    const angleRad = angleDeg * Math.PI / 180;
    w.x = Math.cos(angleRad) * workerRadius;
    w.y = Math.sin(angleRad) * workerRadius;
    w.visible = true;
  });
}

function hideWorkers(dirId) {
  workerNodes.forEach(w => {
    if (w.parentDir === dirId) {
      w.visible = false;
    }
  });
}

// ============================================================
// COORDINATE TRANSFORMS
// ============================================================
function worldToScreen(wx, wy) {
  return {
    x: cx + (wx + panX) * scale,
    y: cy + (wy + panY) * scale
  };
}

function screenToWorld(sx, sy) {
  return {
    x: (sx - cx) / scale - panX,
    y: (sy - cy) / scale - panY
  };
}

// ============================================================
// DRAWING
// ============================================================
function drawRings() {
  ctx.strokeStyle = '#0d1525';
  ctx.lineWidth = 1;
  [150, 300, 420].forEach(r => {
    const sr = r * scale;
    const center = worldToScreen(0, 0);
    ctx.beginPath();
    ctx.arc(center.x, center.y, sr, 0, Math.PI * 2);
    ctx.stroke();
  });
}

function drawConnections() {
  connections.forEach(conn => {
    const fromNode = nodes.find(n => n.id === conn.from);
    const toNode = nodes.find(n => n.id === conn.to);
    if (!fromNode || !toNode || !fromNode.visible || !toNode.visible) return;

    // Dim connections when a director is expanded (except active ones)
    let alpha = 0.15;
    if (expandedDirector) {
      if (conn.to === expandedDirector || conn.from === expandedDirector) {
        alpha = 0.6;
      } else {
        alpha = 0.05;
      }
    }
    if (hoveredNode && (conn.from === hoveredNode.id || conn.to === hoveredNode.id)) {
      alpha = 0.5;
    }

    const from = worldToScreen(fromNode.x, fromNode.y);
    const to = worldToScreen(toNode.x, toNode.y);

    ctx.strokeStyle = `rgba(10, 26, 48, ${alpha})`;
    if (alpha > 0.3) ctx.strokeStyle = `rgba(0, 212, 255, ${alpha})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(from.x, from.y);
    ctx.lineTo(to.x, to.y);
    ctx.stroke();
  });

  // Worker connections
  if (expandedDirector) {
    const dirNode = nodes.find(n => n.id === expandedDirector);
    if (dirNode) {
      const from = worldToScreen(dirNode.x, dirNode.y);
      workerNodes.filter(w => w.parentDir === expandedDirector && w.visible).forEach(w => {
        const to = worldToScreen(w.x, w.y);
        ctx.strokeStyle = 'rgba(0, 212, 255, 0.25)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(from.x, from.y);
        ctx.lineTo(to.x, to.y);
        ctx.stroke();
      });
    }
  }
}

function drawNode(node, isHovered) {
  if (!node.visible) return;
  const pos = worldToScreen(node.x, node.y);
  const r = node.radius * scale;

  // Glow
  if (node.type === 'ceo' || isHovered) {
    const glowSize = r * 2;
    const grad = ctx.createRadialGradient(pos.x, pos.y, r * 0.5, pos.x, pos.y, glowSize);
    grad.addColorStop(0, node.color + '40');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, glowSize, 0, Math.PI * 2);
    ctx.fill();
  }

  // Dim non-active directors when one is expanded
  let dimFactor = 1.0;
  if (expandedDirector && node.type === 'director' && node.id !== expandedDirector) {
    dimFactor = 0.35;
  }

  // Node body
  ctx.fillStyle = node.color;
  ctx.globalAlpha = dimFactor;
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1.0;

  // CEO heartbeat pulse
  if (node.type === 'ceo') {
    const pulse = 1 + Math.sin(animFrame * 0.03) * 0.15;
    ctx.strokeStyle = node.color + '60';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, r * pulse * 1.4, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Label
  let fontSize, labelY;
  if (node.type === 'ceo') {
    fontSize = Math.max(10, 14 * scale);
    labelY = pos.y + r + fontSize + 4;
  } else if (node.type === 'vp') {
    fontSize = Math.max(9, 13 * scale);
    labelY = pos.y + r + fontSize + 3;
  } else if (node.type === 'director') {
    fontSize = Math.max(8, 11 * scale);
    labelY = pos.y + r + fontSize + 2;
  } else {
    fontSize = Math.max(7, 9 * scale);
    labelY = pos.y + r + fontSize + 1;
  }

  ctx.font = `600 ${fontSize}px Inter`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';

  // Text shadow for legibility
  ctx.fillStyle = '#000000';
  ctx.globalAlpha = 0.7 * dimFactor;
  ctx.fillText(node.name, pos.x + 1, labelY + 1);
  ctx.globalAlpha = dimFactor;
  ctx.fillStyle = '#e0e8f0';
  ctx.fillText(node.name, pos.x, labelY);
  ctx.globalAlpha = 1.0;
}

function drawWorkerNode(node, isHovered) {
  if (!node.visible) return;
  const pos = worldToScreen(node.x, node.y);
  const r = node.radius * scale;

  // Status color
  let color = '#1a2535';
  if (node.status === 'active') color = '#00d4ff';
  else if (node.status === 'done') color = '#00ff88';
  else if (node.status === 'blocked') color = '#ff3344';

  if (isHovered) {
    const glowSize = r * 2.5;
    const grad = ctx.createRadialGradient(pos.x, pos.y, r * 0.3, pos.x, pos.y, glowSize);
    grad.addColorStop(0, color + '60');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, glowSize, 0, Math.PI * 2);
    ctx.fill();
  }

  // Active pulse
  if (node.status === 'active') {
    const pulse = 1 + Math.sin(animFrame * 0.05 + node.index) * 0.3;
    ctx.fillStyle = color + '30';
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, r * pulse * 1.8, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
  ctx.fill();

  // Worker label
  const fontSize = Math.max(7, 8 * scale);
  ctx.font = `500 ${fontSize}px Inter`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#000000';
  ctx.globalAlpha = 0.6;
  ctx.fillText(node.name, pos.x + 1, pos.y + r + 3);
  ctx.globalAlpha = 1.0;
  ctx.fillStyle = '#8a9ab0';
  ctx.fillText(node.name, pos.x, pos.y + r + 2);
}

function drawParticles() {
  particles.forEach(p => {
    // Draw trail
    p.trail.forEach((tp, i) => {
      const pos = worldToScreen(tp.x, tp.y);
      const alpha = tp.alpha * 0.6;
      const size = p.size * scale * (tp.alpha * 0.5 + 0.5);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, size, 0, Math.PI * 2);
      ctx.fill();
    });

    // Draw head with glow
    if (p.trail.length > 0) {
      const head = p.trail[p.trail.length - 1];
      const pos = worldToScreen(head.x, head.y);

      // Glow
      const grad = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, p.glowSize * scale);
      grad.addColorStop(0, p.color + 'cc');
      grad.addColorStop(1, 'transparent');
      ctx.globalAlpha = 0.8;
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, p.glowSize * scale, 0, Math.PI * 2);
      ctx.fill();

      // Core
      ctx.globalAlpha = 1.0;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, p.size * scale, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1.0;
  });
}

// ============================================================
// MAIN RENDER LOOP
// ============================================================
function render() {
  animFrame++;
  ctx.clearRect(0, 0, W, H);

  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';

  drawRings();
  drawConnections();

  // Draw nodes in order: workers (back), directors, VPs, CEO (front)
  workerNodes.forEach(n => drawWorkerNode(n, hoveredNode && hoveredNode.id === n.id));
  nodes.filter(n => n.type === 'director').forEach(n => drawNode(n, hoveredNode && hoveredNode.id === n.id));
  nodes.filter(n => n.type === 'vp').forEach(n => drawNode(n, hoveredNode && hoveredNode.id === n.id));
  nodes.filter(n => n.type === 'ceo').forEach(n => drawNode(n, hoveredNode && hoveredNode.id === n.id));

  drawParticles();
  updateParticles();

  // Ambient particles
  ambientTimer++;
  if (ambientTimer > 180) { // every ~3 seconds at 60fps
    spawnAmbientParticle();
    ambientTimer = 0;
  }

  requestAnimationFrame(render);
}

// ============================================================
// INTERACTIONS
// ============================================================
function getNodeAtPosition(sx, sy) {
  const world = screenToWorld(sx, sy);

  // Check workers first (smallest, on top when expanded)
  for (const n of workerNodes) {
    if (!n.visible) continue;
    const dx = world.x - n.x;
    const dy = world.y - n.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < n.radius + 8) return n;
  }

  // Then other nodes (reverse order for front-to-back)
  const ordered = [...nodes].reverse();
  for (const n of ordered) {
    if (!n.visible) continue;
    const dx = world.x - n.x;
    const dy = world.y - n.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const hitRadius = n.radius + 8;
    if (dist < hitRadius) return n;
  }

  return null;
}

canvas.addEventListener('mousedown', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  const node = getNodeAtPosition(mx, my);
  if (node) {
    handleNodeClick(node);
    return;
  }

  dragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  panStartX = panX;
  panStartY = panY;
});

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  if (dragging) {
    panX = panStartX + (e.clientX - dragStartX) / scale;
    panY = panStartY + (e.clientY - dragStartY) / scale;
    return;
  }

  const node = getNodeAtPosition(mx, my);
  hoveredNode = node;
  canvas.style.cursor = node ? 'pointer' : 'grab';

  // Tooltip
  const tooltip = document.getElementById('tooltip');
  if (node) {
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 15) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
    tooltip.querySelector('.tt-name').textContent = node.name;
    tooltip.querySelector('.tt-role').textContent = node.role || node.type;
    let statText = '';
    if (node.workerCount !== undefined) statText = `Workers: ${node.workerCount}`;
    if (node.status) statText = `Status: ${node.status}`;
    if (node.type === 'ceo') statText = 'Central Command';
    tooltip.querySelector('.tt-stat').textContent = statText;
  } else {
    tooltip.style.display = 'none';
  }

  // Update node details panel
  if (node) {
    updateNodeDetails(node);
  }
});

canvas.addEventListener('mouseup', () => { dragging = false; });
canvas.addEventListener('mouseleave', () => {
  dragging = false;
  document.getElementById('tooltip').style.display = 'none';
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const zoomFactor = e.deltaY > 0 ? 0.92 : 1.08;
  scale = Math.max(0.5, Math.min(2.0, scale * zoomFactor));
}, { passive: false });

function handleNodeClick(node) {
  selectedNode = node;
  updateNodeDetails(node);

  if (node.type === 'director') {
    if (expandedDirector === node.id) {
      // Collapse
      hideWorkers(expandedDirector);
      expandedDirector = null;
      document.getElementById('sidebar').classList.remove('visible');
    } else {
      // Collapse previous
      if (expandedDirector) hideWorkers(expandedDirector);
      // Expand new
      expandedDirector = node.id;
      calcWorkerPositions(node);
      showSidebar(node);
    }
  } else if (node.type === 'ceo') {
    // Pulse: spawn particles to all VPs
    VPS.forEach(vp => {
      createParticle(CEO.id, vp.id, 'dispatch');
    });
  } else if (node.type === 'vp') {
    // Spawn particles to its directors
    const vpDirs = VP_DIRS[node.id] || [];
    vpDirs.forEach(d => {
      setTimeout(() => createParticle(node.id, d.id, 'dispatch'), Math.random() * 500);
    });
  }
}

function showSidebar(dirNode) {
  const sidebar = document.getElementById('sidebar');
  sidebar.classList.add('visible');
  document.getElementById('sidebar-title').textContent = dirNode.name;
  document.getElementById('sidebar-count').textContent = `${dirNode.workerCount} workers`;

  const container = document.getElementById('sidebar-workers');
  container.innerHTML = '';

  if (dirNode.workers) {
    dirNode.workers.forEach(w => {
      const wNode = workerNodes.find(n => n.id === `worker-${dirNode.id}-${w}`);
      const status = wNode ? wNode.status : 'idle';
      const item = document.createElement('div');
      item.className = 'worker-item';
      item.innerHTML = `<div class="worker-dot ${status}"></div><span class="worker-name">${w}</span>`;
      container.appendChild(item);
    });
  }
}

function updateNodeDetails(node) {
  const panel = document.getElementById('node-details');
  let html = `<div class="detail-name">${node.name}</div>`;
  html += `<div class="detail-role">${node.role || node.type}</div>`;

  if (node.type === 'ceo') {
    html += `<div class="detail-stat"><span class="stat-label">Type</span><span class="stat-value amber">Central AI</span></div>`;
    html += `<div class="detail-stat"><span class="stat-label">VPs</span><span class="stat-value">${VPS.length}</span></div>`;
    html += `<div class="detail-stat"><span class="stat-label">Total Entities</span><span class="stat-value">165</span></div>`;
  } else if (node.type === 'vp') {
    const dirs = VP_DIRS[node.id] || [];
    const totalWorkers = dirs.reduce((s, d) => s + d.workerCount, 0);
    html += `<div class="detail-stat"><span class="stat-label">Directors</span><span class="stat-value">${dirs.length}</span></div>`;
    html += `<div class="detail-stat"><span class="stat-label">Workers</span><span class="stat-value">${totalWorkers}</span></div>`;
    html += `<div class="detail-stat"><span class="stat-label">Sector</span><span class="stat-value">${node.sector[0]}-${node.sector[1]} deg</span></div>`;
  } else if (node.type === 'director') {
    html += `<div class="detail-stat"><span class="stat-label">Workers</span><span class="stat-value cyan">${node.workerCount}</span></div>`;
    html += `<div class="detail-stat"><span class="stat-label">Parent</span><span class="stat-value">${node.parentVP}</span></div>`;
    html += `<div class="detail-stat"><span class="stat-label">Angle</span><span class="stat-value">${Math.round(node.angleDeg)} deg</span></div>`;
    html += `<div class="detail-stat"><span class="stat-label">Status</span><span class="stat-value green">${node.expanded ? 'Expanded' : 'Collapsed'}</span></div>`;
  } else if (node.type === 'worker') {
    html += `<div class="detail-stat"><span class="stat-label">Status</span><span class="stat-value">${node.status}</span></div>`;
    html += `<div class="detail-stat"><span class="stat-label">Director</span><span class="stat-value">${node.parentDir}</span></div>`;
  }

  panel.innerHTML = html;
}

// ============================================================
// CLOCK
// ============================================================
function updateClock() {
  const now = new Date();
  const utc = now.toISOString().substr(11, 8);
  document.getElementById('clock').textContent = utc + ' UTC';
}
setInterval(updateClock, 1000);
updateClock();

// ============================================================
// API POLLING
// ============================================================
const API_BASE = 'http://localhost:8421';
let lastEvents = [];

async function fetchData() {
  try {
    // Health
    const healthRes = await fetch(`${API_BASE}/health`, { signal: AbortSignal.timeout(3000) });
    if (healthRes.ok) {
      const health = await healthRes.json();
      document.getElementById('health-val').textContent = (health.health_pct || 100) + '%';
      document.getElementById('s-uptime').textContent = health.uptime || '--';
      const badge = document.getElementById('state-badge');
      if (health.state === 'GUARDIAN' || health.state === 'guardian') {
        badge.className = 'badge badge-guardian';
        badge.textContent = 'GUARDIAN';
      } else {
        badge.className = 'badge badge-active';
        badge.textContent = 'ACTIVE';
      }
    }
  } catch (e) {}

  try {
    // Tasks
    const tasksRes = await fetch(`${API_BASE}/tasks`, { signal: AbortSignal.timeout(3000) });
    if (tasksRes.ok) {
      const tasks = await tasksRes.json();
      const list = Array.isArray(tasks) ? tasks : (tasks.tasks || []);
      let active = 0, done = 0, pending = 0, blocked = 0;
      list.forEach(t => {
        const s = (t.status || '').toLowerCase();
        if (s === 'in_progress' || s === 'active') active++;
        else if (s === 'done' || s === 'completed') done++;
        else if (s === 'blocked') blocked++;
        else pending++;
      });
      document.getElementById('s-active').textContent = active;
      document.getElementById('s-done').textContent = done;
      document.getElementById('s-pending').textContent = pending;
      document.getElementById('s-blocked').textContent = blocked;

      // Update worker statuses based on tasks
      list.forEach(t => {
        if (t.assigned_to) {
          const worker = workerNodes.find(w => w.name === t.assigned_to || w.id.includes(t.assigned_to));
          if (worker) {
            const s = (t.status || '').toLowerCase();
            if (s === 'in_progress' || s === 'active') worker.status = 'active';
            else if (s === 'done' || s === 'completed') worker.status = 'done';
            else if (s === 'blocked') worker.status = 'blocked';
            else worker.status = 'idle';
          }
        }
      });
    }
  } catch (e) {}

  try {
    // Budget
    const budgetRes = await fetch(`${API_BASE}/budget`, { signal: AbortSignal.timeout(3000) });
    if (budgetRes.ok) {
      const budget = await budgetRes.json();
      const pct = budget.percentage || budget.used_pct || 0;
      const el = document.getElementById('s-budget');
      el.textContent = Math.round(pct) + '%';
      el.className = 'stat-value ' + (pct >= 95 ? 'red' : pct >= 80 ? 'amber' : 'green');
    }
  } catch (e) {}

  try {
    // Audit/Events
    const auditRes = await fetch(`${API_BASE}/audit?limit=30`, { signal: AbortSignal.timeout(3000) });
    if (auditRes.ok) {
      const audit = await auditRes.json();
      const events = Array.isArray(audit) ? audit : (audit.events || audit.entries || []);
      updateEventFeed(events);
    }
  } catch (e) {}
}

function updateEventFeed(events) {
  const feed = document.getElementById('event-feed');
  feed.innerHTML = '';

  const recent = events.slice(0, 15);
  recent.forEach(ev => {
    const item = document.createElement('div');
    item.className = 'event-item';

    const time = ev.timestamp ? new Date(ev.timestamp).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) : '--:--';
    const type = ev.type || ev.action || 'info';
    let typeClass = 'info';
    if (type.includes('dispatch') || type.includes('assign')) typeClass = 'dispatch';
    else if (type.includes('complete') || type.includes('done')) typeClass = 'complete';
    else if (type.includes('error') || type.includes('fail')) typeClass = 'error';

    const msg = ev.message || ev.description || ev.detail || JSON.stringify(ev).substring(0, 80);

    item.innerHTML = `<span class="event-time">${time}</span><span class="event-type ${typeClass}">${type}</span><span class="event-msg">${msg}</span>`;
    feed.appendChild(item);
  });

  // Spawn particle on new dispatch events
  if (events.length > 0 && events[0] !== lastEvents[0]) {
    const newest = events[0];
    const type = newest.type || newest.action || '';
    if (type.includes('dispatch') || type.includes('assign')) {
      createParticle(CEO.id, VPS[Math.floor(Math.random() * VPS.length)].id, 'dispatch');
    } else if (type.includes('complete') || type.includes('done')) {
      const vpId = VPS[Math.floor(Math.random() * VPS.length)].id;
      createParticle(vpId, CEO.id, 'return');
    }
  }
  lastEvents = events;
}

// Initial fetch and interval
fetchData();
setInterval(fetchData, 8000);

// Add some demo events if API is down
setTimeout(() => {
  const feed = document.getElementById('event-feed');
  if (feed.children.length === 0) {
    const demoEvents = [
      { timestamp: new Date().toISOString(), type: 'system', message: 'Dashboard initialized - awaiting API connection' },
      { timestamp: new Date().toISOString(), type: 'info', message: 'Radial view: CEO + 4 VPs + 28 Directors visible' },
      { timestamp: new Date().toISOString(), type: 'info', message: 'Click a Director to expand workers' },
    ];
    updateEventFeed(demoEvents);
  }
}, 2000);

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (expandedDirector) {
      hideWorkers(expandedDirector);
      expandedDirector = null;
      document.getElementById('sidebar').classList.remove('visible');
    }
    scale = 1.0;
    panX = 0;
    panY = 0;
  }
  if (e.key === '+' || e.key === '=') {
    scale = Math.min(2.0, scale * 1.1);
  }
  if (e.key === '-') {
    scale = Math.max(0.5, scale * 0.9);
  }
});

// ============================================================
// START
// ============================================================
render();
</script>
